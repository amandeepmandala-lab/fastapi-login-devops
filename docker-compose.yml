version: "3.9"

services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: login_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d login_db"]
      interval: 5s
      retries: 5
      timeout: 5s

  app:
    build: .
    container_name: fastapi_app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://myuser:mypassword@db:5432/login_db

    volumes:
      - .:/app

    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: